<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>修改 POS 商品 | 錦輝後台</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <div id="login-view" class="min-h-screen flex items-center justify-center px-4">
        <form id="login-form" class="bg-white shadow-md rounded-lg p-8 w-full max-w-sm space-y-4">
            <h1 class="text-xl font-bold text-center">錦輝後台登入</h1>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Email</label>
                <input type="email" id="login-email" required autocomplete="username"
                       class="w-full border rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">密碼</label>
                <input type="password" id="login-password" required autocomplete="current-password"
                       class="w-full border rounded px-3 py-2">
            </div>
            <p id="login-error" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700">
                登入
            </button>
        </form>
    </div>

    <div id="app-view" class="hidden">
        <header class="bg-white border-b sticky top-0 z-10">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center gap-4 flex-wrap">
                <h1 class="text-lg font-bold">錦輝後台</h1>
                <div class="flex items-center gap-3 flex-wrap">
                    <input type="text" id="search-input" placeholder="搜尋品名 / 貨號 / 分類"
                           class="border rounded px-3 py-1.5 text-sm w-56">
                    <button id="new-product-btn" class="bg-blue-600 text-white text-sm px-4 py-1.5 rounded hover:bg-blue-700">
                        + 新增商品
                    </button>
                    <span id="user-email" class="text-sm text-gray-500"></span>
                    <button id="logout-btn" class="text-sm text-gray-500 hover:text-red-600 underline">登出</button>
                </div>
            </div>
            <nav id="admin-nav" class="admin-nav"></nav>
        </header>

        <main class="container mx-auto px-4 py-6">
            <p id="status-msg" class="text-sm text-gray-500 mb-3"></p>
            <div class="overflow-x-auto bg-white rounded-lg shadow-sm border">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-100 text-gray-600 text-left">
                        <tr>
                            <th class="px-3 py-2">上架</th>
                            <th class="px-3 py-2">圖片</th>
                            <th class="px-3 py-2">ERP 貨號</th>
                            <th class="px-3 py-2">中文品名</th>
                            <th class="px-3 py-2">英文品名</th>
                            <th class="px-3 py-2 w-40">操作</th>
                        </tr>
                    </thead>
                    <tbody id="product-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
                <h2 id="modal-title" class="font-bold text-lg">編輯商品</h2>
                <button id="modal-close-btn" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <form id="product-form" class="px-6 py-4 space-y-3">
                <div id="form-fields" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>

                <div id="variant-section" class="border-t pt-4 mt-2">
                    <h3 class="font-bold text-sm text-gray-700 mb-2">POS 規格／孔徑／顏色選項</h3>
                    <div id="variant-list" class="space-y-2 mb-3"></div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 items-end border rounded-lg p-3 bg-gray-50">
                        <div>
                            <label class="field-label">規格</label>
                            <input type="text" id="new-variant-spec" class="field-input">
                        </div>
                        <div>
                            <label class="field-label">孔徑</label>
                            <input type="text" id="new-variant-bore" class="field-input">
                        </div>
                        <div>
                            <label class="field-label">顏色</label>
                            <input type="text" id="new-variant-color" class="field-input">
                        </div>
                        <div>
                            <label class="field-label">圖片</label>
                            <input type="file" id="new-variant-image" accept="image/*" class="text-xs">
                        </div>
                        <div class="col-span-2 sm:col-span-4 flex items-center gap-2">
                            <button type="button" id="add-variant-btn" class="px-3 py-1.5 text-sm rounded bg-blue-600 text-white hover:bg-blue-700">
                                新增選項
                            </button>
                            <span id="variant-add-status" class="text-xs text-gray-400"></span>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">只填一欄＝定義一個可點選項目；兩欄以上都填＝那個確切組合的實際照片。</p>
                </div>

                <p id="form-error" class="text-sm text-red-600 hidden"></p>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" id="modal-cancel-btn" class="px-4 py-2 rounded border text-gray-600 hover:bg-gray-50">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">
                        儲存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin/shared.js"></script>
    <script src="/admin/admin.js"></script>
</body>
</html>
