<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>客戶資訊 | 錦輝後台</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <div id="login-view" class="min-h-screen flex items-center justify-center px-4">
        <form id="login-form" class="bg-white shadow-md rounded-lg p-8 w-full max-w-sm space-y-4">
            <h1 class="text-xl font-bold text-center">錦輝後台登入</h1>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Email</label>
                <input type="email" id="login-email" required autocomplete="username"
                       class="w-full border rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">密碼</label>
                <input type="password" id="login-password" required autocomplete="current-password"
                       class="w-full border rounded px-3 py-2">
            </div>
            <p id="login-error" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700">
                登入
            </button>
        </form>
    </div>

    <div id="app-view" class="hidden">
        <header class="bg-white border-b sticky top-0 z-10">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center gap-4 flex-wrap">
                <h1 class="text-lg font-bold">錦輝後台</h1>
                <div class="flex items-center gap-3 flex-wrap">
                    <span id="user-email" class="text-sm text-gray-500"></span>
                    <button id="edit-display-name-btn" class="text-xs text-blue-600 hover:underline">設定顯示名稱</button>
                    <button id="logout-btn" class="text-sm text-gray-500 hover:text-red-600 underline">登出</button>
                </div>
            </div>
            <nav id="admin-nav" class="admin-nav"></nav>
        </header>

        <main class="container mx-auto px-4 py-6">
            <div class="flex items-center gap-3 flex-wrap mb-4">
                <input type="text" id="search-input" placeholder="搜尋客戶名稱 / 電話"
                       class="border rounded px-3 py-1.5 text-sm w-56">
                <button id="new-customer-btn" class="bg-blue-600 text-white text-sm px-4 py-1.5 rounded hover:bg-blue-700">
                    + 新增客戶
                </button>
            </div>
            <p id="status-msg" class="text-sm text-gray-500 mb-3"></p>
            <div class="overflow-x-auto bg-white rounded-lg shadow-sm border">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-100 text-gray-600 text-left">
                        <tr>
                            <th class="px-3 py-2">客戶名稱</th>
                            <th class="px-3 py-2">工地名稱</th>
                            <th class="px-3 py-2">區域</th>
                            <th class="px-3 py-2">地址</th>
                            <th class="px-3 py-2">聯絡人</th>
                            <th class="px-3 py-2">電話</th>
                            <th class="px-3 py-2 w-32">操作</th>
                        </tr>
                    </thead>
                    <tbody id="customer-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/40 hidden items-start justify-center z-50 p-4 overflow-y-auto">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md my-8 max-h-[calc(100vh-4rem)] overflow-y-auto">
            <div class="px-6 py-4 border-b flex justify-between items-center">
                <h2 id="modal-title" class="font-bold text-lg">編輯客戶</h2>
                <button id="modal-close-btn" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <form id="customer-form" class="px-6 py-4 space-y-3">
                <div>
                    <label class="field-label">客戶名稱</label>
                    <input type="text" class="field-input" data-key="name" required>
                </div>
                <div>
                    <label class="field-label">工地名稱</label>
                    <input type="text" class="field-input" data-key="site_name">
                </div>
                <div>
                    <label class="field-label">區域</label>
                    <input type="text" class="field-input" data-key="region" list="region-datalist">
                    <datalist id="region-datalist"></datalist>
                </div>
                <div>
                    <label class="field-label">地址</label>
                    <input type="text" class="field-input" data-key="address">
                </div>
                <div>
                    <label class="field-label">聯絡人</label>
                    <input type="text" class="field-input" data-key="contact_person">
                </div>
                <div>
                    <label class="field-label">電話</label>
                    <input type="text" class="field-input" data-key="phone">
                </div>
                <p id="form-error" class="text-sm text-red-600 hidden"></p>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" id="modal-cancel-btn" class="px-4 py-2 rounded border text-gray-600 hover:bg-gray-50">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">
                        儲存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin/shared.js"></script>
    <script src="/admin/customers.js"></script>
</body>
</html>
