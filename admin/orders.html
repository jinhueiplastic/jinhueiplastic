<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>查詢訂單 | 錦輝後台</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <div id="login-view" class="min-h-screen flex items-center justify-center px-4">
        <form id="login-form" class="bg-white shadow-md rounded-lg p-8 w-full max-w-sm space-y-4">
            <h1 class="text-xl font-bold text-center">錦輝後台登入</h1>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Email</label>
                <input type="email" id="login-email" required autocomplete="username"
                       class="w-full border rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">密碼</label>
                <input type="password" id="login-password" required autocomplete="current-password"
                       class="w-full border rounded px-3 py-2">
            </div>
            <p id="login-error" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700">
                登入
            </button>
        </form>
    </div>

    <div id="app-view" class="hidden">
        <header class="bg-white border-b sticky top-0 z-10">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center gap-4 flex-wrap">
                <h1 class="text-lg font-bold">錦輝後台</h1>
                <div class="flex items-center gap-3 flex-wrap">
                    <span id="user-email" class="text-sm text-gray-500"></span>
                    <button id="logout-btn" class="text-sm text-gray-500 hover:text-red-600 underline">登出</button>
                </div>
            </div>
            <nav id="admin-nav" class="admin-nav"></nav>
        </header>

        <main class="container mx-auto px-4 py-6 max-w-4xl">
            <h2 class="text-lg font-bold mb-4">查詢訂單</h2>

            <div class="bg-white border rounded-lg p-4 mb-4 grid grid-cols-1 md:grid-cols-5 gap-3 items-end">
                <div>
                    <label class="field-label">訂單編號</label>
                    <input type="text" id="q-order-no" class="field-input" placeholder="PO-000001">
                </div>
                <div>
                    <label class="field-label">客戶（名稱/電話）</label>
                    <input type="text" id="q-customer" class="field-input">
                </div>
                <div>
                    <label class="field-label">商品（貨號/名稱）</label>
                    <input type="text" id="q-product" class="field-input">
                </div>
                <div>
                    <label class="field-label">起</label>
                    <input type="date" id="q-date-from" class="field-input">
                </div>
                <div>
                    <label class="field-label">迄</label>
                    <input type="date" id="q-date-to" class="field-input">
                </div>
                <div class="md:col-span-5 flex gap-2">
                    <button type="button" id="search-btn" class="px-4 py-2 text-sm rounded bg-blue-600 text-white hover:bg-blue-700">查詢</button>
                    <button type="button" id="reset-btn" class="px-4 py-2 text-sm rounded border bg-white hover:bg-gray-100">清除條件</button>
                </div>
            </div>

            <p id="status-msg" class="text-sm text-gray-500 mb-3"></p>
            <div id="results-container"></div>
        </main>
    </div>

    <script src="/admin/shared.js"></script>
    <script src="/admin/pdf.js"></script>
    <script src="/admin/orders.js"></script>
</body>
</html>
